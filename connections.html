<!DOCTYPE html>
<html>
<head>
  <title>Connections 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 120px);
      gap: 10px;
      justify-content: center;
    }

    .tile {
      padding: 10px;
      border: 1px solid #ccc;
      cursor: pointer;
      user-select: none;
    }

    .selected {
      background: #ddd;
    }

    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🏠 HOME BUTTON (KEEP ONLY ONE) -->
<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<div>
  <h2>Connections</h2>

  <div class="grid" id="grid"></div>

  <button onclick="submitGroup()">Submit</button>

  <p id="status" style="font-size:18px; font-weight:bold;"></p>
</div>

<script>

/////////////////////////////
// 🔥 FIXED GROUP STRUCTURE
/////////////////////////////

const groups = [
  {
    name: "FIRST DATE ORDERS",
    words: ["PIZZA","PISTACHIO","MOZZARELLA BALLS","RAVIOLI"]
  },
  {
    name: "DATING SPOTS",
    words: ["AMANAO","KODAWARI","MINANTE","TALES AND FEELINGS"]
  },
  {
    name: "CALL NAMES",
    words: ["BABA","LOVEY","LANGLING","BABY"]
  },
  {
    name: "BABE FAVORITES",
    words: ["BURGER","TTEOKBOKKI","COOKIES","COCO MILKTEA"]
  }
];

/////////////////////////////
// SHUFFLE WORDS
/////////////////////////////

let allWords = groups.flatMap(g => g.words)
  .sort(() => Math.random() - 0.5);

let selected = [];
let solved = [];

document.getElementById("grid").innerHTML =
  allWords.map(w =>
    `<div class="tile" onclick="toggle(this,'${w}')">${w}</div>`
  ).join("");

function toggle(el, word) {
  if (solved.includes(word)) return;

  if (selected.includes(word)) {
    selected = selected.filter(x => x !== word);
    el.classList.remove("selected");
  } else if (selected.length < 4) {
    selected.push(word);
    el.classList.add("selected");
  }
}

function submitGroup() {
  if (selected.length !== 4) return;

  let match = groups.find(g =>
    g.words.every(w => selected.includes(w))
  );

  if (match) {
    solved.push(...match.words);

    document.querySelectorAll(".tile").forEach(t => {
      if (match.words.includes(t.innerText)) {
        t.style.background = "#c8f7c5";
        t.style.pointerEvents = "none";
      }
    });

    document.getElementById("status").innerText =
      "Solved: " + match.name + " 💛";

  } else {
    document.getElementById("status").innerText = "Wrong ❌";
  }

  selected = [];
}

</script>

</body>
</html>
