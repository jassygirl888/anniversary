<!DOCTYPE html>
<html>
<head>
  <title>Connections 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 120px);
      gap: 10px;
      justify-content: center;
    }

    .tile {
      width: 120px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    .selected {
      background: #ddd;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<div>
  <h2>Connections</h2>

  <div id="solved"></div>
  <div class="grid" id="grid"></div>

  <button onclick="submitGroup()">Submit</button>
  <p id="status"></p>
</div>

<script>

const groups = [
  { name: "FIRST DATE ORDERS", words: ["PIZZA","PISTACHIO","MOZZARELLA BALLS","RAVIOLI"] },
  { name: "DATING SPOTS", words: ["AMANAO","KODAWARI","MINANTE","TALES AND FEELINGS"] },
  { name: "CALL NAMES", words: ["BABA","LOVEY","LANGLING","BABY"] },
  { name: "BABE FAVORITES", words: ["BURGER","TTEOKBOKKI","COOKIES","COCO MILKTEA"] }
];

let allWords = groups.flatMap(g => g.words)
  .sort(() => Math.random() - 0.5);

let selected = [];
let solved = [];

document.getElementById("grid").innerHTML =
  allWords.map(w =>
    `<div class="tile" onclick="toggle(this,'${w}')">${w}</div>`
  ).join("");

function toggle(el, word) {
  if (selected.includes(word)) {
    selected = selected.filter(x => x !== word);
    el.classList.remove("selected");
  } else if (selected.length < 4) {
    selected.push(word);
    el.classList.add("selected");
  }
}

function submitGroup() {
  if (selected.length !== 4) return;

  let match = groups.find(g =>
    g.words.every(w => selected.includes(w))
  );

  if (match) {
    solved.push(...match.words);

    // remove from grid
    document.querySelectorAll(".tile").forEach(t => {
      if (match.words.includes(t.innerText)) t.remove();
    });

    // create solved row
    let row = document.createElement("div");
    row.className = "grid";

    match.words.forEach(w => {
      let box = document.createElement("div");
      box.className = "tile";
      box.style.background = "#c8f7c5";
      box.innerText = w;
      row.appendChild(box);
    });

    document.getElementById("solved").appendChild(row);

    document.getElementById("status").innerText =
      "Solved: " + match.name + " 💛";
  }

  selected = [];
}

</script>

</body>
</html>
