<!DOCTYPE html>
<html>
<head>
  <title>Connections 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
      flex-direction: column;
    }

    .home {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #game {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      gap: 10px;
      justify-content: center;
    }

    .tile {
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ccc;
      cursor: pointer;
      font-weight: bold;
      background: white;
      border-radius: 12px; /* 🔥 smooth edges */
      transition: 0.2s;
      text-align: center;
      padding: 5px;
    }

    .tile.selected {
      background: #ddd;
    }

    .locked {
      color: white;
      border: none;
      cursor: default;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #status {
      font-weight: bold;
      height: 24px;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<h2>Connections</h2>

<div id="game">

  <div id="solved"></div>

  <div class="grid" id="grid"></div>

  <button onclick="submitGroup()">Submit</button>

  <p id="status"></p>

</div>

<script>

/////////////////////////////
// 🔥 EDIT GROUPS HERE
/////////////////////////////

const groups = [
  { name: "FIRST DATE ORDERS", words: ["PIZZA","PISTACHIO","MOZZARELLA BALLS","RAVIOLI"] },
  { name: "DATING SPOTS", words: ["AMANO","KODAWARI","MINANTE","TALES AND FEELINGS"] },
  { name: "CALL NAMES", words: ["BABA","LOVEY","LANGLING","BABY"] },
  { name: "BABE FAVORITES", words: ["BURGER","TTEOKBOKKI","COOKIES","COCO MILKTEA"] }
];

/////////////////////////////
// 🎨 UPDATED COLOR ORDER
/////////////////////////////

const colors = [
  "#f9df6d", // yellow
  "#6aaa64", // green
  "#a0c4ff", // blue
  "#cdb4db"  // purple
];

let allWords = groups.flatMap(g => g.words)
  .sort(() => Math.random() - 0.5);

let selected = [];
let solvedCount = 0;

function renderGrid() {
  document.getElementById("grid").innerHTML =
    allWords.map(w =>
      `<div class="tile" onclick="toggle(this,'${w}')">${w}</div>`
    ).join("");
}

renderGrid();

function toggle(el, word) {
  if (selected.includes(word)) {
    selected = selected.filter(x => x !== word);
    el.classList.remove("selected");
  } else if (selected.length < 4) {
    selected.push(word);
    el.classList.add("selected");
  }
}

function submitGroup() {
  if (selected.length !== 4) return;

  let match = groups.find(g =>
    g.words.every(w => selected.includes(w))
  );

  // 🔥 NEW: "1 away" logic
  let almost = groups.find(g => {
    let common = g.words.filter(w => selected.includes(w)).length;
    return common === 3;
  });

  if (match) {
    allWords = allWords.filter(w => !match.words.includes(w));

    let row = document.createElement("div");
    row.className = "grid";

    match.words.forEach(w => {
      let box = document.createElement("div");
      box.className = "tile locked";
      box.style.background = colors[solvedCount];
      box.innerText = w;
      row.appendChild(box);
    });

    document.getElementById("solved").appendChild(row);

    solvedCount++;
    renderGrid();

    document.getElementById("status").innerText =
      "Solved: " + match.name + " 💛";

  } else if (almost) {
    document.getElementById("status").innerText =
      "So close… 1 away 👀";
  } else {
    document.getElementById("status").innerText =
      "Not quite ❌";
  }

  selected = [];

  document.querySelectorAll(".tile").forEach(t =>
    t.classList.remove("selected")
  );
}

</script>

</body>
</html>
