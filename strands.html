<!DOCTYPE html>
<html>
<head>
  <title>Strands 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .selected {
      background: #ddd;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<div>
  <h2>Strands</h2>
  <p>Theme: Moments of Us 💛</p>

  <div class="grid" id="grid"></div>

  <p>Current: <span id="current"></span></p>

  <button onclick="submitWord()">Submit</button>

  <p id="status"></p>

  <p id="spangram" style="display:none; font-weight:bold;">
    🌟 Spangram: SEASON ONE 💛
  </p>
</div>

<script>

const words = ["PHOTOBOOTH","PIZZA","CALLS","COFFEE","SUSHI","JESSY","TICKETS"];

let pool = words.join("").split("");
pool.sort(() => Math.random() - 0.5);

let grid = [];
let current = "";
let found = [];
let selected = [];

let size = 6;

pool.forEach((l, i) => {
  grid.push({
    letter: l,
    row: Math.floor(i / size),
    col: i % size
  });
});

document.getElementById("grid").innerHTML =
  grid.map((c, i) =>
    `<div class="cell" onclick="pick(${i})">${c.letter}</div>`
  ).join("");

function pick(i) {
  let cell = grid[i];

  if (selected.length === 0) {
    selected.push(i);
  } else {
    let last = grid[selected[selected.length - 1]];

    let adjacent =
      Math.abs(last.row - cell.row) <= 1 &&
      Math.abs(last.col - cell.col) <= 1;

    if (!adjacent) return;
    selected.push(i);
  }

  document.querySelectorAll(".cell")[i].classList.add("selected");

  current = selected.map(x => grid[x].letter).join("");
  document.getElementById("current").innerText = current;
}

function submitWord() {
  if (words.includes(current) && !found.includes(current)) {
    found.push(current);
    document.getElementById("status").innerText = "Found 💛";
  } else {
    document.getElementById("status").innerText = "Try again 💭";
  }

  current = "";
  document.getElementById("current").innerText = "";

  document.querySelectorAll(".cell").forEach(c =>
    c.classList.remove("selected")
  );

  selected = [];

  if (found.length === words.length) {
    document.getElementById("spangram").style.display = "block";
  }
}

</script>

</body>
</html>
