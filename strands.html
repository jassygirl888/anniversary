<!DOCTYPE html>
<html>
<head>
  <title>Strands 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    /* 🏠 HOME BUTTON */
    .home {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 6px;
      justify-content: center;
      margin-top: 10px;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      font-size: 18px;
    }

    .selected {
      background: #ddd;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #333;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🏠 HOME BUTTON -->
<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<div>
  <h2>Strands</h2>
  <p>Theme: Moments of Us 💛</p>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <p>Current word: <span id="current"></span></p>

  <button onclick="submitWord()">Submit</button>

  <p id="status"></p>

  <p id="spangram" style="display:none; font-weight:bold;">
    🌟 Spangram Unlocked: SEASON ONE
  </p>
</div>

<script>

//////////////////////////////
// 🔥 EDIT WORDS HERE ONLY
//////////////////////////////

const words = ["PHOTOBOOTHS","PIZZA","CALLS","COFFEE","SUSHI","JESSY","SEASONONE","TICKETS"];

// create letter pool
let pool = "PHOTOBOOTHSPIZZACALLSCOFFEESUSHIJESSYSEASONONETICKETS".split("");

// shuffle letters (important for gameplay feel)
pool.sort(() => Math.random() - 0.5);

let current = "";
let found = [];

// render grid
document.getElementById("grid").innerHTML =
  pool.map(l =>
    `<div class="cell" onclick="pick(this,'${l}')">${l}</div>`
  ).join("");

function pick(el, letter) {
  el.classList.add("selected");
  current += letter;
  document.getElementById("current").innerText = current;
}

function submitWord() {
  if (words.includes(current) && !found.includes(current)) {
    found.push(current);
    document.getElementById("status").innerText =
      "Found: " + current + " 💛";
  } else {
    document.getElementById("status").innerText =
      "Try again 💭";
  }

  current = "";
  document.getElementById("current").innerText = "";

  // reset selection visuals
  document.querySelectorAll(".cell").forEach(c =>
    c.classList.remove("selected")
  );

  // win condition
  if (found.length === words.length) {
    document.getElementById("spangram").style.display = "block";
  }
}

</script>

</body>
</html>
