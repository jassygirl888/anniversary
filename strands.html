<!DOCTYPE html>
<html>
<head>
  <title>Strands 💛</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 5px;
      justify-content: center;
    }

    .cell {
      border: 1px solid #ccc;
      padding: 10px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>

<div>
  <h2>Strands</h2>

  <p>Theme: Moments of Us 💛</p>

  <div class="grid" id="grid"></div>

  <p>Word: <span id="current"></span></p>

  <button onclick="submit()">Submit</button>

  <p id="status"></p>
  <p id="spangram" style="display:none; font-weight:bold;">
    🌟 Spangram: FOREVERUS 💛
  </p>
</div>

<script>

/////////////////////////////
// 🔥 CHANGE WORDS HERE
/////////////////////////////

const words = ["PIZZA","COOKIES","TIRAMISU","BURGER","TRIP"];

let letters = "LOVEDATECALLSTRIP".split("");
let current = "";

document.getElementById("grid").innerHTML =
  letters.map(l =>
    `<div class="cell" onclick="add('${l}')">${l}</div>`
  ).join("");

function add(l) {
  current += l;
  document.getElementById("current").innerText = current;
}

function submit() {
  if (words.includes(current)) {
    document.getElementById("status").innerText = "Found 💛";
  } else {
    document.getElementById("status").innerText = "Try again 💭";
  }

  current = "";
  document.getElementById("current").innerText = "";

  if (words.length === 0) {
    document.getElementById("spangram").style.display = "block";
  }
}

</script>

</body>
</html>
