<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
      flex-direction: column;
    }

    .home {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #board {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .tile {
      width: 45px;
      height: 45px;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .keyrow {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      padding: 10px;
      min-width: 30px;
      border: none;
      background: #ddd;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    .wide {
      min-width: 60px;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<h2>Wordle</h2>

<div id="board"></div>

<p id="status"></p>

<!-- KEYBOARD -->
<div class="keyboard">
  <div class="keyrow" id="row1"></div>
  <div class="keyrow" id="row2"></div>
  <div class="keyrow" id="row3"></div>
</div>

<script>

const ANSWER = "LOVEY";
let current = "";
let tries = 0;

const keys = [
  "QWERTYUIOP",
  "ASDFGHJKL",
  "ENTERZXCVBNM⌫"
];

// build keyboard
keys.forEach((row, i) => {
  let container = document.getElementById("row" + (i+1));

  row.split("").forEach(k => {
    let key = document.createElement("button");
    key.innerText = k;
    key.className = "key";

    if (k === "ENTER" || k === "⌫") {
      key.classList.add("wide");
    }

    key.onclick = () => handleKey(k);
    container.appendChild(key);
  });
});

// create empty rows
for (let i = 0; i < 5; i++) {
  let row = document.createElement("div");
  row.className = "row";

  for (let j = 0; j < 5; j++) {
    let tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  document.getElementById("board").appendChild(row);
}

function handleKey(k) {
  if (tries >= 5) return;

  if (k === "⌫") {
    current = current.slice(0, -1);
  } else if (k === "ENTER") {
    if (current.length === 5) submitGuess();
    return;
  } else {
    if (current.length < 5) {
      current += k;
    }
  }

  updateTiles();
}

function updateTiles() {
  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    tiles[i].innerText = current[i] || "";
  }
}

function submitGuess() {
  let row = document.getElementsByClassName("row")[tries];
  let tiles = row.children;

  for (let i = 0; i < 5; i++) {
    let letter = current[i];

    if (letter === ANSWER[i]) {
      tiles[i].style.background = "#6aaa64";
      tiles[i].style.color = "white";
    } else if (ANSWER.includes(letter)) {
      tiles[i].style.background = "#c9b458";
      tiles[i].style.color = "white";
    } else {
      tiles[i].style.background = "#787c7e";
      tiles[i].style.color = "white";
    }
  }

  if (current === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
  }

  tries++;
  current = "";
}

</script>

</body>
</html>
