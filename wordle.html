<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }
    
    input {
      font-size: 20px;
      padding: 10px;
    }
    
    button {
      padding: 10px 15px;
      font-size: 16px;
    }
    
    #board div {
      font-size: 28px;
      margin: 6px;
      letter-spacing: 3px;
    }
  </style>
</head>

<button onclick="location.href='index.html'" 
style="position:fixed; top:15px; left:15px; padding:8px 12px; border:none; border-radius:6px; background:#333; color:white; cursor:pointer;">
🏠 Home
</button>  
  
<body>

<div>
  <h2>Wordle</h2>

  <input id="guess" maxlength="5" />
  <button onclick="check()">Guess</button>

  <div id="board"></div>
  <p id="status"></p>
</div>

<script>

const ANSWER = "LOVEY"; // 🔥 CHANGE THIS

let tries = 0;

function check() {
  if (tries >= 5) return;

  let g = document.getElementById("guess").value.toUpperCase();
  let result = "";

  for (let i = 0; i < 5; i++) {
    if (g[i] === ANSWER[i]) result += "🟩";
    else if (ANSWER.includes(g[i])) result += "🟨";
    else result += "⬜";
  }

  document.getElementById("board").innerHTML += `<div>${g} ${result}</div>`;
  tries++;

  if (g === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
  } else if (tries === 5) {
    document.getElementById("status").innerText = "Answer: " + ANSWER;
  }

  document.getElementById("guess").value = "";
}

</script>

</body>
</html>
