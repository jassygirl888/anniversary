<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }
    
    input {
      font-size: 20px;
      padding: 10px;
    }
    
    button {
      padding: 10px 15px;
      font-size: 16px;
    }
    
    #board {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
  }
  
  .row {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  
  .tile {
    width: 40px;
    height: 40px;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
  }
  </style>
</head>

<!-- 🏠 HOME BUTTON -->
<button class="home" onclick="location.href='index.html'">🏠 Home</button>
  
<body>

<div>
  <h2>Wordle</h2>

  <input id="guess" maxlength="5" />
  <button onclick="check()">Guess</button>

  <div id="board"></div>
  <p id="status"></p>
</div>

<script>

const ANSWER = "LOVEY"; // 🔥 CHANGE THIS

let tries = 0;

function check() {
  if (tries >= 5) return;

  let g = document.getElementById("guess").value.toUpperCase();
  let row = document.createElement("div");
  row.className = "row";

  for (let i = 0; i < 5; i++) {
    let box = document.createElement("div");
    box.className = "tile";
    box.innerText = g[i];

    if (g[i] === ANSWER[i]) {
      box.style.background = "#6aaa64"; // green
      box.style.color = "white";
    } else if (ANSWER.includes(g[i])) {
      box.style.background = "#c9b458"; // yellow
      box.style.color = "white";
    }

    row.appendChild(box);
  }

  document.getElementById("board").appendChild(row);
  tries++;

  if (g === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
  }

  document.getElementById("guess").value = "";
}

</script>

</body>
</html>
