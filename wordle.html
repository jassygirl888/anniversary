<!DOCTYPE html>
<html>
<head>
  <title>Wordle</title>

  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #fafafa;
      text-align: center;
    }

    .home {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      cursor: pointer;
    }
    #guess {
      font-size: 24px;
      padding: 140px;
      width: 160px;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    
    #guess:focus {
    outline: none;
    border-color: #6aaa64;
  }
    
    #board {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .tile {
      width: 45px;
      height: 45px;
      border: 2px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<button class="home" onclick="location.href='index.html'">🏠 Home</button>

<div>
  <h2>Wordle</h2>

  <input id="guess" maxlength="45" />
  <button onclick="check()">Guess</button>

  <div id="board"></div>
  <p id="status"></p>
</div>

<script>

const ANSWER = "LOVEY";
let tries = 0;

function check() {
  if (tries >= 5) return;

  let g = document.getElementById("guess").value.toUpperCase();
  let row = document.createElement("div");
  row.className = "row";

  for (let i = 0; i < 5; i++) {
    let box = document.createElement("div");
    box.className = "tile";
    box.innerText = g[i];

    if (g[i] === ANSWER[i]) {
      box.style.background = "#6aaa64";
      box.style.color = "white";
    } else if (ANSWER.includes(g[i])) {
      box.style.background = "#c9b458";
      box.style.color = "white";
    }

    row.appendChild(box);
  }

  document.getElementById("board").appendChild(row);
  tries++;

  if (g === ANSWER) {
    document.getElementById("status").innerText = "You got it 💛";
  }

  document.getElementById("guess").value = "";
}

</script>

</body>
</html>
